resources:
  jobs:
    injestionJob:
      name: injestionJob
      tasks:
        - task_key: injestion_taks
          notebook_task:
            notebook_path: ../../resources/notebooks/Ingetion.ipynb
            base_parameters:
              catalog_name: ${var.catalog_name}
            source: WORKSPACE
      queue:
        enabled: true
      performance_target: PERFORMANCE_OPTIMIZED